<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trimstone — Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<!-- Supabase JS replaced with direct REST fetch calls -->
<style>
/* ── TOKENS ─────────────────────────────────── */
:root{
  --navy:#0f1f3d;--navy-mid:#1a3260;
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-pale:#faf3e0;
  --cream:#fdfbf7;--white:#ffffff;
  --gray-50:#f8f7f5;--gray-100:#eeece8;--gray-200:#d8d5ce;
  --gray-300:#c0bcb3;--gray-400:#9e9b93;--gray-600:#6b6860;--gray-800:#2c2b27;
  --green:#639922;--green-lt:#EAF3DE;--green-txt:#27500A;
  --red:#E24B4A;--red-lt:#FCEBEB;--red-txt:#7F1D1D;
  --amber:#EF9F27;--amber-lt:#FAEEDA;--amber-txt:#412402;
  --purple:#7F77DD;--purple-lt:#EEEDFE;--purple-txt:#3C3489;
  --blue:#378ADD;--blue-lt:#E6F1FB;--blue-txt:#0C447C;
  --teal:#1D9E75;--teal-lt:#E1F5EE;--teal-txt:#085041;
  --sidebar:260px;--topbar:56px;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--gray-800);display:flex;min-height:100vh}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar{width:var(--sidebar);background:var(--navy);min-height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-name{font-family:'DM Serif Display',serif;font-size:20px;color:var(--white);letter-spacing:.02em}
.sidebar-logo-sub{font-size:9px;color:rgba(201,168,76,.7);letter-spacing:.18em;text-transform:uppercase;margin-top:5px;font-weight:500}
.sidebar-section{padding:14px 0 4px}
.sidebar-label{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 20px 7px}
.sidebar-btn{display:flex;align-items:center;gap:9px;padding:8px 20px;font-size:12px;color:rgba(255,255,255,.62);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.sidebar-btn:hover{color:var(--white);background:rgba(255,255,255,.05)}
.sidebar-btn.active{color:var(--white);border-left-color:var(--gold);background:rgba(201,168,76,.08)}
.sidebar-btn svg{width:15px;height:15px;opacity:.6;flex-shrink:0}
.sidebar-btn.active svg{opacity:1}
.sidebar-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 20px}
.proj-list{padding:4px 0}
.proj-item{display:flex;align-items:center;gap:8px;padding:6px 20px 6px 24px;font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item:hover{color:rgba(255,255,255,.85)}
.proj-item.active{color:var(--gold-light);font-weight:500}
.proj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.28);line-height:1.5}

/* ── MAIN ────────────────────────────────────── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:500;color:var(--gray-800)}
.topbar-badge{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:8px}
.view-toggle{display:flex;border:1px solid var(--gray-200);border-radius:20px;overflow:hidden;background:var(--white)}
.vt-btn{font-size:11px;padding:5px 14px;background:transparent;border:none;color:var(--gray-400);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.vt-btn.active{background:var(--navy);color:var(--white)}
.btn{font-size:11px;padding:5px 13px;border-radius:var(--r8);border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--gray-50);border-color:var(--gray-300)}
.btn-primary{background:var(--navy);color:var(--white);border-color:var(--navy)}
.btn-primary:hover{background:var(--navy-mid)}
.content{padding:24px 28px;flex:1}

/* ── LOADING ─────────────────────────────────── */
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:2px solid var(--gray-200);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUMMARY CARDS ───────────────────────────── */
.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.sum-card{border-radius:var(--r12);padding:14px 16px}
.sum-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;opacity:.8}
.sum-num{font-size:28px;font-weight:500;line-height:1;margin-bottom:3px}
.sum-sub{font-size:10px;opacity:.75}

/* ── PIPELINE STRIP ──────────────────────────── */
.pipeline-strip{display:flex;border-bottom:1px solid var(--gray-100);margin-bottom:16px;overflow-x:auto;background:var(--white);border-radius:var(--r12) var(--r12) 0 0;box-shadow:var(--shadow)}
.pipe-tab{flex:1;min-width:80px;padding:10px 6px 12px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;position:relative}
.pipe-dot{width:7px;height:7px;border-radius:50%;margin:0 auto 5px}
.pipe-name{font-size:9px;font-weight:500;line-height:1.25;color:var(--gray-400)}
.pipe-tab.active .pipe-name{color:var(--gray-800)}
.pipe-count{font-size:9px;font-weight:500;margin-top:2px}

/* ── FILTER ROW ──────────────────────────────── */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filt{font-size:11px;padding:4px 12px;border-radius:12px;border:1px solid var(--gray-200);background:transparent;color:var(--gray-400);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.filt:hover{border-color:var(--gray-300);color:var(--gray-600)}
.filt.active{background:var(--gray-800);color:var(--white);border-color:var(--gray-800)}
.filt.red-active{background:var(--red-lt);color:var(--red-txt);border-color:var(--red)}
.filt.amber-active{background:var(--amber-lt);color:var(--amber-txt);border-color:var(--amber)}

/* ── PROJECT CARDS ───────────────────────────── */
.proj-cards{display:flex;flex-direction:column;gap:8px}
.pcard{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r12);overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s}
.pcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--gray-200)}
.pcard.open{border-color:var(--gray-300)}
.pcard.red  .pcard-head{border-left:4px solid var(--red)}
.pcard.amber.pcard-head,.pcard.amber > .pcard-head{border-left:4px solid var(--amber)}
.pcard.green > .pcard-head{border-left:4px solid var(--green)}
.pcard-head{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;border-left:4px solid transparent;transition:background .1s}
.pcard:hover .pcard-head{background:var(--gray-50)}
.pcard.open .pcard-head{border-bottom:1px solid var(--gray-100)}
.pc-main{flex:1;min-width:0}
.pc-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.pc-name{font-size:13px;font-weight:500;color:var(--gray-800)}
.pc-client{font-size:11px;color:var(--gray-400)}
.pc-pills{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:500;white-space:nowrap}
.days-badge{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.prog-mini{display:flex;align-items:center;gap:5px;margin-left:auto}
.prog-bar-mini{width:56px;height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden}
.prog-fill-mini{height:100%;border-radius:2px;transition:width .3s}
.alert-row{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.alert-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--r8);border:1px solid}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-body{flex:1}
.alert-title{font-size:11px;font-weight:500;line-height:1.3}
.alert-sub{font-size:10px;margin-top:2px;opacity:.8;line-height:1.4}
.md-req{font-size:9px;padding:1px 6px;border-radius:5px;background:var(--red-lt);color:var(--red-txt);font-weight:500;flex-shrink:0;white-space:nowrap;align-self:flex-start}

/* ── EXPANDED BODY ───────────────────────────── */
.pcard-body{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pb-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:8px}
.pcl-item{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--gray-50);font-size:11px}
.pcl-item:last-child{border-bottom:none}
.pcl-tick{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--gray-200)}
.pcl-tick.done{background:var(--green-lt);border-color:transparent}
.pcl-tick.done::after{content:'✓';font-size:8px;color:var(--green-txt)}
.pcl-text{flex:1;color:var(--gray-800);line-height:1.3}
.pcl-text.done{text-decoration:line-through;color:var(--gray-300)}
.blocker-bang{font-size:9px;padding:1px 5px;border-radius:5px;background:var(--red-lt);color:var(--red-txt);font-weight:500}
.pcard-btns{padding:8px 16px 10px;border-top:1px solid var(--gray-50);display:flex;gap:6px;flex-wrap:wrap}

/* ── OWNER VIEW ──────────────────────────────── */
.owner-wrap{}
.owner-proj-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.opill{font-size:11px;padding:4px 12px;border-radius:12px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-400);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.opill.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.stage-tabs-row{display:flex;overflow-x:auto;border-bottom:1px solid var(--gray-100);margin-bottom:16px;background:var(--white);border-radius:var(--r12) var(--r12) 0 0;box-shadow:var(--shadow)}
.stab{flex:1;min-width:80px;padding:9px 4px 11px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.stab-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 4px}
.stab-name{font-size:9px;font-weight:500;color:var(--gray-400);line-height:1.2}
.stab-now{font-size:8px;font-weight:500;margin-top:2px}
.stab.active .stab-name{color:var(--gray-800)}
.owner-panel{background:transparent;border:none;border-radius:0;box-shadow:none}
.op-head{padding:10px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.op-stage-name{font-size:14px;font-weight:500;color:var(--gray-800)}
.op-pct{font-size:11px;color:var(--gray-400);margin-left:auto}
.gates-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px;border-bottom:1px solid var(--gray-100)}
.gate-box{border-radius:var(--r8);padding:8px 10px}
.gate-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.gate-txt{font-size:11px;font-weight:500;line-height:1.4}
.prog-row-full{padding:8px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:10px}
.prog-bar-full{flex:1;height:5px;background:var(--gray-100);border-radius:3px;overflow:hidden}
.prog-fill-full{height:100%;border-radius:3px;transition:width .3s}
.groups{padding:8px 16px}
.grp{border:1px solid var(--gray-100);border-radius:var(--r8);margin-bottom:7px;overflow:hidden}
.grp:last-child{margin-bottom:0}
.grp-head{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--gray-50);cursor:pointer;border-bottom:1px solid var(--gray-100)}
.grp-head.collapsed{border-bottom:none}
.grp-icon{font-size:13px;color:var(--gray-400)}
.grp-name{font-size:11px;font-weight:500;color:var(--gray-800)}
.grp-stats{font-size:10px;color:var(--gray-400);margin-left:auto}
.q-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid var(--gray-50);cursor:pointer;transition:background .1s}
.q-row:last-child{border-bottom:none}
.q-row:hover{background:var(--gray-50)}
.qtick{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--gray-200);font-size:9px;margin-top:1px}
.qtick.y{background:var(--green-lt);border-color:transparent;color:var(--green-txt)}
.qtick.n{background:var(--red-lt);border-color:transparent;color:var(--red-txt)}
.qtick.na{background:var(--gray-50);color:var(--gray-400)}
.qtick.cond{background:var(--amber-lt);border-color:transparent;color:var(--amber-txt)}
.qtick.u{background:transparent;border:1px dashed var(--gray-200);color:var(--gray-300)}
.qbody{flex:1}
.qtext{font-size:11px;color:var(--gray-800);line-height:1.4}
.qsub{font-size:10px;color:var(--gray-400);margin-top:2px;line-height:1.4}
.qcrit{font-size:9px;padding:1px 6px;border-radius:6px;font-weight:500;flex-shrink:0;white-space:nowrap;align-self:flex-start;margin-top:2px}
.q-expand{padding:8px 10px 10px 35px;display:none;border-bottom:1px solid var(--gray-50);background:var(--gray-50)}
.q-row.open+.q-expand{display:block}
.qdetail{font-size:10px;color:var(--gray-600);line-height:1.6;margin-bottom:8px}
.qbtns{display:flex;gap:5px;flex-wrap:wrap}
.qb{font-size:11px;padding:4px 12px;border-radius:var(--r8);border:1px solid;cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s}
.qb.y{border-color:var(--green);color:var(--green-txt)}.qb.y:hover{background:var(--green-lt)}
.qb.n{border-color:var(--red);color:var(--red-txt)}.qb.n:hover{background:var(--red-lt)}
.qb.na{border-color:var(--gray-200);color:var(--gray-400)}.qb.na:hover{background:var(--gray-50)}
.cond-block{background:var(--amber-lt);border:1px solid var(--amber);border-radius:var(--r8);padding:9px 11px;margin-top:6px}
.cond-q{font-size:11px;font-weight:500;color:var(--amber-txt);margin-bottom:7px}
.cond-btns{display:flex;gap:6px;flex-wrap:nowrap}
.cond-btn{font-size:11px;padding:4px 12px;border-radius:var(--r8);border:1px solid;cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;font-weight:500}
.cond-btn.req{border-color:var(--amber);color:var(--amber-txt)}.cond-btn.req:hover{background:var(--amber-lt)}
.cond-btn.skip{border-color:var(--gray-200);color:var(--gray-400)}.cond-btn.skip:hover{background:var(--gray-50)}
.status-strip{padding:8px 16px;display:flex;align-items:center;gap:7px;border-top:1px solid var(--gray-100)}
.ss-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cl-section{padding:8px 16px;border-top:1px solid var(--gray-100)}
.cl-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:7px}
.cl-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--gray-100);border-radius:var(--r8);margin-bottom:4px}
.cl-row:last-child{margin-bottom:0}
.cl-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap}
.cl-desc{flex:1;font-size:10px;color:var(--gray-400)}
.cl-open{font-size:10px;padding:3px 10px;border-radius:var(--r8);border:1px solid var(--gray-300);background:var(--white);color:var(--gray-800);cursor:pointer;font-family:'DM Sans',sans-serif}
.cl-open:hover{background:var(--gray-50)}
.fin-note{margin:0 16px 12px;padding:8px 10px;border-radius:var(--r8);border-left:3px solid var(--gold);background:var(--gold-pale);font-size:10px;color:var(--gray-600);line-height:1.6}
.fin-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}

/* ── MODAL ───────────────────────────────────── */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,31,61,.4);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--white);border-radius:var(--r16);padding:20px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:500;color:var(--gray-800);margin-bottom:14px}
.modal label{font-size:11px;color:var(--gray-400);display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select{width:100%;padding:7px 10px;border:1px solid var(--gray-200);border-radius:var(--r8);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--gray-800);background:var(--white);outline:none}
.modal input:focus,.modal select:focus{border-color:var(--navy)}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── SAVING INDICATOR ────────────────────────── */
.save-indicator{position:fixed;bottom:20px;right:20px;background:var(--navy);color:var(--white);font-size:11px;padding:8px 14px;border-radius:var(--r8);z-index:200;display:none;align-items:center;gap:7px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.save-indicator.show{display:flex}

/* ── EMPTY STATE ─────────────────────────────── */
.empty{text-align:center;padding:3rem 1rem;color:var(--gray-400);font-size:13px}

/* ── GRID VIEW ───────────────────────────────── */
.grid-wrap{overflow-x:auto}
.grid-legend{display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap;padding:8px 0}
.gl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray-600)}
.gl-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.grid-proj-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.grid-pill{font-size:11px;padding:4px 12px;border-radius:12px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.grid-pill.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.gtable{border-collapse:collapse;min-width:100%}
.gtable th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);padding:6px 4px;text-align:center;border-bottom:1px solid var(--gray-100);white-space:nowrap;min-width:52px}
.gtable th.th-label{text-align:left;min-width:130px;padding-left:0;color:var(--gray-600)}
.gtable th.th-stage{cursor:pointer;transition:all .12s;padding:6px 3px}
.gtable th.th-stage:hover{background:var(--gray-50)}
.gtable th.th-stage.cur{color:var(--navy)}
.th-dot-g{width:7px;height:7px;border-radius:50%;margin:0 auto 3px}
.th-now-g{font-size:8px;margin-top:2px;font-weight:600}
.gtable tr.g-group-row td{background:var(--gray-50);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);padding:5px 4px;border-top:1px solid var(--gray-100);border-bottom:1px solid var(--gray-100);text-align:center}
.gtable tr.g-group-row td.g-grp-label{text-align:left;padding-left:2px;display:flex;align-items:center;gap:5px}
.gtable tr.g-action-row td{border-bottom:1px solid var(--gray-50);padding:1px 2px}
.gtable tr.g-action-row td.g-row-label{font-size:10px;color:var(--gray-800);padding:5px 6px 5px 2px;line-height:1.3;vertical-align:middle;font-style:normal}

const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Accept': 'application/json'
}

async function sbSelect(table, columns='*', filters={}) {
  let url = SUPABASE_REST + '/' + table + '?select=' + columns
  Object.entries(filters).forEach(([k,v]) => url += `&${k}=eq.${encodeURIComponent(v)}`)
  const r = await fetch(url, { headers: HEADERS, mode: 'cors' })
  if (!r.ok) {
    const txt = await r.text()
    throw new Error(`${table} ${r.status}: ${txt}`)
  }
  return r.json()
}

async function sbUpsert(table, row, onConflict) {
  const url = SUPABASE_REST + '/' + table + '?on_conflict=' + onConflict
  const r = await fetch(url, {
    method: 'POST',
    headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(row)
  })
  if (!r.ok) { const t = await r.text(); throw new Error(t) }
  return { error: null }
}

async function sbInsert(table, row) {
  const url = SUPABASE_REST + '/' + table
  const r = await fetch(url, {
    method: 'POST',
    headers: HEADERS,
    body: JSON.stringify(row)
  })
  if (!r.ok) { const t = await r.text(); throw new Error(t) }
  return { data: await r.json(), error: null }
}

async function loadDashboard() {

  }

  try {
    const [rows, prog, tix] = await Promise.all([
      sbSelect('projects', 'id,deal_name,account_name,deal_owner,current_stage,updated_at'),
      sbSelect('project_stage_progress', 'project_id,stage_key,done_count,total_count,pct_complete'),
      sbSelect('ticks', 'project_id,stage_key,action_id,is_done,is_na,last_toggled_by,last_toggled_at'),
    ])

    // Build tick map: "pid__stage__action" → {done, na}
    const tickMap = {}
    tix.forEach(t => {
      const k = `${t.project_id}__${t.stage_key}__${t.action_id}`
      const v = { done: t.is_done, na: t.is_na || false, by: t.last_toggled_by, at: t.last_toggled_at }
      tickMap[k] = v
      allTicksCache[k] = v
    })

    // Build progress map
    const progMap = {}
    prog.forEach(p => { progMap[`${p.project_id}__${p.stage_key}`] = p })

    // Build projects array
    projects = (rows || []).map(r => {
      const answers = buildAnswers(r.id, r.current_stage, tickMap)
      return {
        id:         r.id,
        name:       r.deal_name || 'Unnamed project',
        client:     r.account_name || '—',
        lp:         r.deal_owner || '—',
        stage:      normaliseStage(r.current_stage || 'discussions'),
        movedAt:    r.updated_at,
        answers,
        condAnswers:{},
        progress:   progMap[`${r.id}__${normaliseStage(r.current_stage||'')}`] || {done_count:0,total_count:0,pct_complete:0},
        status:     calcStatus(r.id, normaliseStage(r.current_stage||''), tickMap),
        alerts:     buildAlerts(r, tickMap),
      }
    })

    // Apply URL params
    if (P.get('project')) {
      const found = projects.find(p => p.id === P.get('project'))
      if (found) ownerSelId = found.id
    }
    if (!ownerSelId) {
    // Default to first project owned by current user, or first project

      : null

    if (ownerSelId) gridSelProj = ownerSelId
  }

}

function buildAnswers(pid, stageKey, tickMap) {
  const answers = {}
  const sd = OWNER_STAGES[stageKey]
  if (!sd) return answers
  sd.groups.flatMap(g => g.qs).forEach(q => {
    if (q.autoYes) {
      answers[q.id] = 'yes'  // Auto-confirmed by Zoho workflow
      return
    }
    const t = tickMap[`${pid}__${stageKey}__${q.id}`]
    if (t) answers[q.id] = t.na ? 'na' : t.done ? 'yes' : 'no'
  })
  return answers
}

function calcStatus(pid, stageKey, tickMap) {
  const sd = OWNER_STAGES[stageKey]
  if (!sd) return 'green'
  const qs = sd.groups.flatMap(g => g.qs)
  const undone = qs.filter(q => q.blocker && !q.conditional &&
    tickMap[`${pid}__${stageKey}__${q.id}`]?.done !== true).length
  return undone > 2 ? 'red' : undone > 0 ? 'amber' : 'green'
}

function buildAlerts(r, tickMap) {
  const alerts = []
  const normStage = normaliseStage(r.current_stage || '')
  const sd = OWNER_STAGES[normStage]
  if (!sd) return alerts
  const blockers = sd.groups.flatMap(g=>g.qs).filter(q =>
    q.blocker && !q.conditional &&
    tickMap[`${r.id}__${normStage}__${q.id}`]?.done !== true
  )
  if (blockers.length > 0) {
    alerts.push({
      icon:'⚠️',
      title:`${blockers.length} critical action${blockers.length>1?'s':''} outstanding`,
      sub: blockers.slice(0,2).map(q=>q.text).join(' · '),
      mdAction: blockers.some(q=>q.id.includes('md') || q.text.toLowerCase().includes('md')),
      urgency: blockers.length > 2 ? 'red' : 'amber'
    })
  }
  const days = daysAgo(r.updated_at)
  if (days > 10 && alerts.length === 0) {
    alerts.push({icon:'⏰',title:`${days} days in this stage — no recent updates`,sub:'Check CRM is up to date and next step is set.',mdAction:false,urgency:'amber'})
  }
  if (alerts.length === 0) {
    alerts.push({icon:'✅',title:'Progressing well',sub:'No critical actions outstanding.',mdAction:false,urgency:'green'})
  }
  return alerts
}

function subscribeToTicks() {
  // Poll every 60 seconds — silently update data without re-rendering
  // Only re-render if user hasn't interacted in the last 5 seconds
  setInterval(async () => {
    try {
      const tix = await sbSelect('ticks', 'project_id,stage_key,action_id,is_done,is_na')
      tix.forEach(t => {
        const p = projects.find(x => x.id === t.project_id)
        if (!p) return
        if (t.stage_key === p.stage) {
          p.answers[t.action_id] = t.is_na ? 'na' : t.is_done ? 'yes' : 'no'
          p.status = recalcStatus(p)
        }
        // Also update allTicksCache
        allTicksCache[t.project_id + '__' + t.stage_key + '__' + t.action_id] = {done: t.is_done, na: t.is_na}
      })
      // Only re-render if user hasn't clicked in last 5 seconds
      const idleSince = Date.now() - lastInteraction
      if (idleSince > 5000) {
        if (mainView === 'owner') renderOwner()
        else renderGrid()
      }
    } catch(e) { /* silent fail */ }
  }, 60000)
}

function recalcStatus(p) {
  const sd = OWNER_STAGES[p.stage]
  if (!sd) return 'green'
  const undone = sd.groups.flatMap(g=>g.qs).filter(q =>
    q.blocker && !q.conditional && p.answers[q.id] !== 'yes'
  ).length
  return undone > 2 ? 'red' : undone > 0 ? 'amber' : 'green'
}

function isEffectiveBlocker(p, q) {
  if (!q.conditional) return q.blocker
  const req = p.condAnswers[`${p.stage}_${q.id}_req`]
  if (req === 'na') return false
  if (req === 'yes') return q.blocker
  return false
}

function critLabel(p, q) {
  if (q.autoYes) {
    return `<span class="qcrit" style="background:#EAF3DE;color:#3B6D11">Auto ✓</span>`
  }
  if (!q.conditional) {
    return q.blocker
      ? `<span class="qcrit" style="background:#FCEBEB;color:#A32D2D">Critical</span>`
      : `<span class="qcrit" style="background:var(--gray-50);color:var(--gray-400)">Recommended</span>`
  }
  const req = p.condAnswers[`${p.stage}_${q.id}_req`]
  if (req === 'yes') return q.blocker
    ? `<span class="qcrit" style="background:#FCEBEB;color:#A32D2D">Critical</span>`
    : `<span class="qcrit" style="background:var(--gray-50);color:var(--gray-400)">Recommended</span>`
  if (req === 'na') return `<span class="qcrit" style="background:var(--gray-50);color:var(--gray-400)">N/A</span>`
  return `<span class="qcrit" style="background:#FAEEDA;color:#854F0B">If needed</span>`
}

        !p.lp || p.lp.toLowerCase().includes(ownerFirstName) ||
        p.id === gridSelProj || p.id === ownerSelId

    if (open) {
      html += list.map(p => {
        const isActive = p.id === gridSelProj || p.id === ownerSelId
        return `<div class="proj-item ${isActive?'active':''}" data-pid="${p.id}" onclick="selProjBoth('${p.id}')" title="${p.name}">
          <div style="display:flex;align-items:center;gap:4px;min-width:0">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px;line-height:1.4">${p.name}</span>
            ${p.lp ? '<span style="font-size:10px;color:rgba(255,255,255,.35);flex-shrink:0;white-space:nowrap">' + p.lp + '</span>' : ''}
          </div>
        </div>`
      }).join('')
    }
    html += `</div>`
  })

  // ── Closed Lost ──
  const lostProjects = projects.filter(p => p.stage === 'lost')
  if (lostProjects.length) {
    const open = sidebarExpanded.has('lost')
    html += `<div class="sidebar-stage-group">
      <div class="sidebar-stage-label" onclick="toggleSidebarStage('lost',event)" style="cursor:pointer;opacity:.6">
        <div style="width:7px;height:7px;border-radius:50%;background:#888780;flex-shrink:0"></div>
        <span style="flex:1">Closed Lost</span>
        <span class="sidebar-stage-count">${lostProjects.length}</span>
        <span style="font-size:9px;opacity:.4;display:inline-block;transform:rotate(${open?'0':'180'}deg)">▲</span>
      </div>`
    if (open) {
      html += lostProjects.map(p => {
        const isActive = p.id === gridSelProj || p.id === ownerSelId
        return `<div class="proj-item ${isActive?'active':''}" data-pid="${p.id}" onclick="selProjBoth('${p.id}')" title="${p.name}" style="opacity:.5">
          <div style="display:flex;align-items:center;gap:4px;min-width:0">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px;line-height:1.4;text-decoration:line-through">${p.name}</span>
            ${p.lp ? '<span style="font-size:10px;color:rgba(255,255,255,.25);flex-shrink:0;white-space:nowrap">' + p.lp + '</span>' : ''}
          </div>
        </div>`
      }).join('')
    }
    html += `</div>`
  }

  // ── Trimstone internal ──
  if (internalProjects.length) {
    const open = sidebarExpanded.has('internal')
    html += `<div class="sidebar-stage-group" style="margin-top:8px;border-top:1px solid rgba(255,255,255,.07);padding-top:8px">
      <div class="sidebar-stage-label" onclick="toggleSidebarStage('internal',event)" style="cursor:pointer">
        <div style="width:7px;height:7px;border-radius:50%;background:#888780;flex-shrink:0"></div>
        <span>Trimstone internal</span>
        <span class="sidebar-stage-count">${internalProjects.length}</span>
        <span style="margin-left:4px;font-size:9px;opacity:.5;display:inline-block;transform:rotate(${open?'0':'180'}deg)">▲</span>
      </div>`
    if (open) {
      html += internalProjects.map(p => {
        const isActive = p.id === gridSelProj || p.id === ownerSelId
        return `<div class="proj-item ${isActive?'active':''}" data-pid="${p.id}" onclick="selProjBoth('${p.id}')" title="${p.name}">
          <div style="display:flex;align-items:center;gap:4px;min-width:0">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px;line-height:1.4">${p.name}</span>
            ${p.lp ? '<span style="font-size:10px;color:rgba(255,255,255,.35);flex-shrink:0;white-space:nowrap">' + p.lp + '</span>' : ''}
          </div>
        </div>`
      }).join('')
    }
    html += `</div>`
  }

  document.getElementById('sidebar-projects').innerHTML = html
  // Update user badge
  const badge = document.getElementById('user-badge')
  if (badge) {
    if (isAdmin) {
      badge.innerHTML = '<span style="background:var(--purple-lt);color:var(--purple-txt);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500">All projects</span>'
    } else if (currentUser !== 'dashboard-user') {
      const name = currentUser.replace('.', ' ')
      badge.innerHTML = '<span style="background:var(--gray-50);color:var(--gray-400);padding:2px 8px;border-radius:10px;font-size:10px">' + name + '</span>'
    }
  }
}

function toggleSidebarStage(stageId, event) {
  if (event) event.stopPropagation()
  if (sidebarExpanded.has(stageId)) sidebarExpanded.delete(stageId)
  else sidebarExpanded.add(stageId)
  renderSidebar() // only re-render sidebar, don't change main view
}

let _renderTimer = null
function selProjBoth(id) {
  ownerSelId  = id
  gridSelProj = id
  gridOpenCell = null
  ownerStage  = null
  ownerOpenQ  = null
  ownerCollapsed.clear()

  // Instant visual feedback — highlight active item in sidebar
  document.querySelectorAll('.proj-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-pid') === id)
  })

  // Update topbar badge instantly
  const p = projects.find(x => x.id === id)
  if (p) {
    const stKey = isInternal(p) ? 'internal' : p.stage
    sidebarExpanded.add(stKey)
    const badge = document.getElementById('topbar-badge')
    if (badge) {
      const st = stFor(p.stage)
      const zohoUrl = 'https://crm.zoho.eu/crm/org20109486492/tab/Potentials/' + p.id.replace('zcrm_', '').replace('zcrm_', '')
      badge.innerHTML = '<span style="cursor:pointer" onclick="window.open(\'' + zohoUrl + '\',\'_blank\')" title="Open in Zoho CRM">' + p.name + ' 🔗</span>'
      badge.style.cssText = 'background:' + st.bg + ';color:' + st.tc
    }
  }

  // Debounce full re-render so rapid clicks don't stack
  clearTimeout(_renderTimer)
  _renderTimer = setTimeout(() => {
    renderSidebar()
    // Use requestAnimationFrame to let browser paint sidebar first
    requestAnimationFrame(() => {
      if (mainView === 'grid') renderGrid()
      else renderOwner()
    })
  }, 60)
}

// ══════════════════════════════════════════════
// OWNER VIEW
// ══════════════════════════════════════════════
function renderOwner() {
  const p = projects.find(x => x.id === ownerSelId)
  if (!p) { document.getElementById('owner-view').innerHTML = '<div class="empty">Select a project from the sidebar.</div>'; return }

  const viewSt = p.stage  // always current stage — no switching allowed
  const vst    = stFor(viewSt)
  const vsd    = OWNER_STAGES[viewSt]
  if (!vsd) return
  const isCur  = true  // always editing current stage
  const answers  = isCur ? p.answers  : {}
  const condAns  = isCur ? p.condAnswers : {}
  const allQs  = vsd.groups.flatMap(g => g.qs)
  const yCount = allQs.filter(q => answers[q.id] === 'yes').length
  const pct    = allQs.length ? Math.round((yCount / allQs.length) * 100) : 0
  const bLeft  = allQs.filter(q => isEffectiveBlocker(p,q) && answers[q.id] !== 'yes' && answers[q.id] !== 'na').length
  const stageIdx = ['discussions','scoping','pricing','contracting','executing','closing','hold','lost'].indexOf(viewSt) + 1

  // Pills
  document.getElementById('owner-pills').innerHTML =
    projects.map(px => `<button class="opill ${ownerSelId===px.id?'active':''}" onclick="selProj('${px.id}')">${px.name}</button>`).join('')

  // Stage tabs
  document.getElementById('stage-tabs').innerHTML = STAGES.map(st => {
    const isCurSt = p.stage === st.id
    const isAct   = viewSt === st.id
    return `<div class="stab ${isAct?'active':''}" style="border-bottom:2px solid ${isAct?st.color:'transparent'}" onclick="oSetStage('${st.id}')">
      <div class="stab-dot" style="background:${st.color}"></div>
      <div class="stab-name" style="${isAct?`color:${st.color}`:''}; font-size:9px">${st.short}</div>
      ${isCurSt ? `<div class="stab-now" style="color:${st.color}">▶ now</div>` : '<div style="height:11px"></div>'}
    </div>`
  }).join('')

  // Build action table rows — exactly like checklist
  let rowNum = 0
  const tableRows = vsd.groups.map(g => {
    const groupRow = `<tr class="group-row"><td colspan="7">${g.name}</td></tr>`
    const actionRows = g.qs.map(q => {
      rowNum++
      const ans    = answers[q.id]
      const reqKey = `${p.stage}_${q.id}_req`
      const req    = condAns[reqKey]
      const isDone = ans === 'yes'
      const isNA   = ans === 'na' || req === 'na'
      const isOpen = ownerOpenQ === `${ownerSelId}-${viewSt}-${q.id}`

      // Checkbox class
      const chkCls = isDone ? 'done' : ''

      // Detail + buttons (shown when row is clicked)
      let detailHtml = ''
      if (isOpen) {
        // SharePoint / Zoho buttons
        const al   = ACTION_LINKS[q.id]
        const _al  = al || (q.id === 'cl2' && req === 'yes' && p.stage === 'contracting' ? KYC_LINK : null)
        const spBtn = _al
          ? `<button class="act-sp-btn" onclick="event.stopPropagation();window.open('${_al.url}','_blank')">${_al.icon} Open ${_al.label} in SharePoint →</button>`
          : ''
        const zohoBtn = q.id.startsWith('crm')
          ? `<button class="act-sp-btn" style="background:#f8f7f5;border-color:#d8d5ce;color:#4a4842" onclick="event.stopPropagation();window.open('https://crm.zoho.eu/crm/org20109486492/tab/Potentials/${p.id.replace('zcrm_','')}','_blank')">🔗 Open deal in Zoho CRM →</button>`
          : ''

        let actionBtns = ''
        if (isCur && !q.autoYes) {
          if (q.conditional && req === undefined) {
            actionBtns = `<div class="cond-confirm">
              <div class="cond-confirm-q">${condQ(q.id)}</div>
              <div class="cond-confirm-btns">
                <button class="cb-yes" onclick="event.stopPropagation();setReq('${reqKey}','yes')">✓ Yes — required${q.blocker?' (Critical)':''}</button>
                <button class="cb-na"  onclick="event.stopPropagation();setReq('${reqKey}','na')">— Not needed</button>
              </div></div>`
          } else if (q.conditional && req === 'yes') {
            actionBtns = `<div class="act-btns">
              <button class="a-btn a-btn-y" onclick="event.stopPropagation();oSetA('${q.id}','yes')">✓ Yes — done</button>
              <button class="a-btn a-btn-n" onclick="event.stopPropagation();oSetA('${q.id}','no')">✗ Not yet</button>
              <button class="a-btn a-btn-na" onclick="event.stopPropagation();setReq('${reqKey}','na')">— N/A</button>
            </div>`
          } else if (q.conditional && req === 'na') {
            actionBtns = `<div style="font-size:11px;color:#9e9b93;margin-top:6px">Marked not required.
              <button class="a-btn a-btn-na" style="padding:2px 8px;font-size:10px" onclick="event.stopPropagation();setReq('${reqKey}',undefined)">Change</button></div>`
          } else if (!q.conditional) {
            actionBtns = `<div class="act-btns">
              <button class="a-btn a-btn-y" onclick="event.stopPropagation();oSetA('${q.id}','yes')">✓ Yes — done</button>
              <button class="a-btn a-btn-n" onclick="event.stopPropagation();oSetA('${q.id}','no')">✗ Not yet</button>
            </div>`
          }
        }
        detailHtml = `<div class="act-detail">${q.detail}</div>${actionBtns}${isDone ? spBtn : ''}${zohoBtn}`
      }

      // Notes cell: use q.notes if exists, else sub
      const notesTxt = q.notes || q.sub || '—'

      return `<tr class="${isDone?'done-row':''}" onclick="oToggleQ('${ownerSelId}-${viewSt}-${q.id}')" style="cursor:pointer">
        <td class="check ${chkCls}" onclick="event.stopPropagation();${
          isCur && !q.conditional && !q.autoYes
            ? `oSetA('${q.id}',${isDone?"'no'":"'yes'"})`
            : `oToggleQ('${ownerSelId}-${viewSt}-${q.id}')`
        }"><span class="box"></span></td>
        <td class="num">${rowNum}</td>
        <td>
          <div>${q.text}${q.conditional && req===undefined?' <span style="font-size:9px;color:#92400e;font-style:italic">if needed</span>':''}${isNA?' <span style="font-size:9px;color:#9e9b93">(N/A)</span>':''}</div>
          ${detailHtml}
        </td>
        <td class="role">${q.owner||'Lead Partner'}</td>
        <td class="role">${q.owner||'Lead Partner'}</td>
        <td class="tool">${q.tool||'—'}</td>
        <td class="notes-cell">${notesTxt}</td>
      </tr>`
    }).join('')
    return groupRow + actionRows
  }).join('')

  // Status strip
  const status = isCur
    ? (bLeft === 0
      ? `<div class="status-strip"><div class="ss-dot" style="background:var(--green)"></div><span style="font-size:11px;color:var(--green-txt)">All critical actions cleared — ready to advance</span></div>`
      : `<div class="status-strip"><div class="ss-dot" style="background:var(--red)"></div><span style="font-size:11px;color:var(--red-txt)">${bLeft} critical action${bLeft>1?'s':''} outstanding before advancing</span></div>`)
    : ''

  // Checklist open buttons
  const clHtml = vsd.roles.map(r => `
    <div class="cl-row">
      <span class="cl-badge" style="background:${r.color};color:${r.tc}">${r.label}</span>
      <span class="cl-desc">${r.desc}</span>
      <button class="cl-open" onclick="openChecklist('${p.id}','${viewSt}','${r.label}')">Open →</button>
    </div>`).join('')

  document.getElementById('owner-panel').innerHTML = `
    <div class="act-stage-banner" style="background:linear-gradient(135deg,${vst.color},${vst.color}aa)">
      <div class="act-banner-eyebrow">Stage ${stageIdx} of 8</div>
      <div class="act-banner-title">${vsd.full}</div>
      <div class="act-banner-meta">
        <div>🔒 <strong>Entry:</strong> ${vsd.entry}</div>
        <div>↗ <strong>Exit:</strong> ${vsd.exit}</div>
      </div>
    </div>

    <div class="act-finance">
      <span style="font-size:14px;flex-shrink:0">💷</span>
      <div><strong>Financial treatment.</strong> ${vsd.finance}</div>
    </div>

    <div class="act-prog">
      <div class="act-prog-bar"><div class="act-prog-fill" style="width:${pct}%;background:${vst.color}"></div></div>
      <span style="font-size:11px;color:var(--cl-gray-400);white-space:nowrap">${yCount} of ${allQs.length} done · ${pct}%</span>
    </div>

    <div class="act-card">
      <div class="act-card-title"><div class="act-dot"></div>Required actions</div>
      <table class="action-table">
        <thead>
          <tr><th style="width:36px"></th><th style="width:28px">#</th><th>Action</th><th style="width:120px">Responsible</th><th style="width:120px">Accountable</th><th style="width:90px">Tool</th><th>Notes</th></tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>

    ${status}

    <div class="cl-section">
      <div class="cl-title">Open shared project checklist</div>
      ${clHtml}
      <div style="font-size:10px;color:var(--cl-gray-400);margin-top:5px">Stage: <strong>${vsd.full}</strong> · Project: <strong>${p.name}</strong> · Role pre-filled automatically</div>
    </div>`

  const _badge_o = document.getElementById('topbar-badge')
  if (_badge_o) {
    _badge_o.innerHTML = '<span style="font-size:13px;font-weight:500;color:var(--gray-800)">' + p.name + '</span>' + (p.client && p.client !== p.name ? '<span style="font-size:11px;color:var(--gray-400);margin-left:6px">' + p.client + '</span>' : '')
    _badge_o.style.cssText = ''
  }
}

function openChecklist(pid, stageKey, role) {
  const base = 'https://trimstone-app.github.io/trimstone-operation-checklist/'
  const roleMap = {'Lead Partner':'lp','Co-owner / Core Partner':'coown','Consulting MD':'md','Iryna':'iryna','James / Miguel':'james','Finance / Filip':'filip','James / Ops':'james'}
  const roleKey = roleMap[role] || 'lp'
  const url = `${base}?project=${encodeURIComponent(pid)}&stage=${stageKey}&role=${roleKey}&user=${encodeURIComponent(currentUser)}`
  window.open(url, '_blank')
}

// Owner actions
function selProj(id) { ownerSelId=id; gridSelProj=id; ownerStage=null; ownerOpenQ=null; ownerCollapsed.clear(); renderSidebar(); renderOwner() }
function oSetStage(id) { ownerStage=id; ownerOpenQ=null; ownerCollapsed.clear(); renderOwner() }
function oToggleQ(k) { ownerOpenQ = ownerOpenQ===k ? null : k; renderOwner() }
function oToggleGrp(id) { ownerCollapsed.has(id) ? ownerCollapsed.delete(id) : ownerCollapsed.add(id); renderOwner() }

async function oSetA(qid, val) {
  const p = projects.find(x => x.id === ownerSelId)
  if (!p) return
  p.answers[qid] = val
  p.status = recalcStatus(p)
  // Keep grid in sync
  const cacheKey = p.id + '__' + p.stage + '__' + qid
  allTicksCache[cacheKey] = { done: val==='yes', na: val==='na' }
  ownerOpenQ = null
  renderOwner()
  // If grid is open, re-render it too so auto-tick updates immediately
  if (mainView === 'grid') renderGrid()
  await writeAnswer(p, qid, val)
}

function setReq(key, val) {
  const p = projects.find(x => x.id === ownerSelId)
  if (!p) return
  if (val === undefined) delete p.condAnswers[key]
  else p.condAnswers[key] = val
  ownerOpenQ = null
  renderOwner()
}

      const isAct = pStageFilter === st.id
      return `<div class="pipe-tab ${isAct?'active':''}" style="border-bottom:2px solid ${isAct?st.color:'transparent'}" onclick="setPStage('${st.id}')">
        <div class="pipe-dot" style="background:${st.color}"></div>
        <div class="pipe-name" style="${isAct?`color:${st.color}`:''}">${st.short}</div>

    }).join('')

  if (pFilter === 'attention') visible = visible.filter(p => p.status!=='green')
  if (pFilter === 'md') visible = visible.filter(p => p.alerts.some(a => a.mdAction))

    const st = stFor(p.stage)

    const prog = p.progress
    const pct = prog.pct_complete ? Math.round(prog.pct_complete) : 0
    const isOpen = pOpenId === p.id
    const sd = OWNER_STAGES[p.stage]
    const allQs = sd ? sd.groups.flatMap(g=>g.qs) : []

    const alertsHtml = p.alerts.map(a => {
      const uc = a.urgency==='red'

        ? {bg:'var(--amber-lt)',border:'#FAC775',tc:'var(--amber-txt)'}

          <div class="alert-title" style="color:${uc.tc}">${a.title}</div>
          <div class="alert-sub" style="color:${uc.tc}">${a.sub}</div>
        </div>
        ${a.mdAction ? `<span class="md-req">MD required</span>` : ''}
      </div>`
    }).join('')

    const clHtml = allQs.slice(0,5).map(q => `
      <div class="pcl-item">
        <div class="pcl-tick ${p.answers[q.id]==='yes'?'done':''}"></div>
        <span class="pcl-text ${p.answers[q.id]==='yes'?'done':''}">${q.text}</span>

    return `<div class="pcard ${p.status} ${isOpen?'open':''}" onclick="pToggle('${p.id}')">

        <div class="pc-main">
          <div class="pc-top">
            <span class="pc-name">${p.name}</span>
            <span class="pc-client">${p.client}</span>

function loadDemoData() {
  const tickMap = {}
  DEMO_TICKS.forEach(t => {
    tickMap[`${t.project_id}__${t.stage_key}__${t.action_id}`] = {done:t.is_done, na:t.is_na||false}
  })

  projects = DEMO_PROJECTS.map(r => {
    const answers = buildAnswers(r.id, r.current_stage, tickMap)
    return {
      id:         r.id,
      name:       r.deal_name,
      client:     r.account_name,
      lp:         r.deal_owner,
      stage:      r.current_stage,
      movedAt:    r.updated_at,
      answers,
      condAnswers:{},
      progress:   calcDemoProgress(r.id, r.current_stage, tickMap),
      status:     calcStatus(r.id, r.current_stage, tickMap),
      alerts:     buildAlerts(r, tickMap),
    }
  })

  if (P.get('project')) {
    const found = projects.find(p => p.id === P.get('project'))
    if (found) ownerSelId = found.id
  }
  if (!ownerSelId) {
    // Default to first project owned by current user, or first project
    const myFirst = ownerFirstName
      ? projects.find(p => p.lp && p.lp.toLowerCase().includes(ownerFirstName))
      : null
    ownerSelId = myFirst?.id || projects[0]?.id
    if (ownerSelId) gridSelProj = ownerSelId
  }
  if (P.get('stage'))  ownerStage = P.get('stage')
  if (P.get('view'))   setMainView(P.get('view'))
  if (P.get('filter')) pFilter = P.get('filter')

  document.getElementById('loading').style.display = 'none'

  // Show demo banner
  const banner = document.createElement('div')
  banner.style.cssText = 'background:#FAEEDA;border-bottom:1px solid #FAC775;padding:7px 28px;font-size:11px;color:#633806;display:flex;align-items:center;gap:8px;'
  banner.innerHTML = '<strong>Demo mode</strong> — showing sample data. Replace <code>SUPABASE_URL</code> and <code>SUPABASE_KEY</code> at the top of this file to connect to live data. Changes made here are not saved.'
  document.querySelector('.main').insertBefore(banner, document.querySelector('.content'))

  renderSidebar()
  if (mainView === 'owner') renderOwner()
  else renderGrid()
}

function calcDemoProgress(pid, stageKey, tickMap) {
  const sd = OWNER_STAGES[stageKey]
  if (!sd) return {done_count:0,total_count:0,pct_complete:0}
  const qs = sd.groups.flatMap(g=>g.qs)
  const done = qs.filter(q => tickMap[`${pid}__${stageKey}__${q.id}`]?.done === true).length
  return {done_count:done, total_count:qs.length, pct_complete:Math.round((done/qs.length)*100)}
}

let gridSelProj = null
let gridOpenCell = null // {itemId, stageId}

let _gridCache = {pid: null, html: null}

function renderGrid() {
  const el = document.getElementById('grid-container')
  if (!el) return
  if (!projects.length) { el.innerHTML = '<div class="empty">No projects loaded.</div>'; return }

  if (!gridSelProj) gridSelProj = projects[0].id
  const p = projects.find(x => x.id === gridSelProj) || projects[0]

  // Always update topbar badge with current project + Zoho link
  const _badge = document.getElementById('topbar-badge')
  if (_badge && p) {
    const st = stFor(p.stage)
    const zohoId = p.id.replace('zcrm_', '')
    const zohoUrl = 'https://crm.zoho.eu/crm/org20109486492/tab/Potentials/' + zohoId
    const _clientPart = (p.client && p.client !== p.name) ? '<span style="font-size:11px;color:var(--gray-400);margin-left:6px">' + p.client + '</span>' : ''
    _badge.innerHTML = '<span style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:500;color:var(--gray-800)" onclick="window.open(\'' + zohoUrl + '\',\'_blank\')" title="Open in Zoho CRM">' + p.name + ' <span style="font-size:11px">🔗</span></span>' + _clientPart
    _badge.style.cssText = ''
  }

  // Project pills — removed from top, now in sidebar grouped by stage
  const pills = ''

  // Legend
  const legend = `<div class="grid-legend">
    <div class="gl-item"><div class="gl-dot" style="background:var(--green-lt);color:var(--green-txt)">✓</div> Done</div>
    <div class="gl-item"><div class="gl-dot" style="background:var(--red-lt);color:var(--red-txt)">✗</div> Not yet</div>
    <div class="gl-item"><div class="gl-dot" style="background:var(--gray-50);border:1px solid var(--gray-200);color:var(--gray-300)">—</div> N/A</div>
    <div class="gl-item"><div class="gl-dot" style="background:var(--amber-lt);color:var(--amber-txt)">?</div> If needed</div>
    <div class="gl-item"><div class="gl-dot" style="background:transparent;border:1.5px dashed var(--gray-200);color:var(--gray-300)">?</div> Unanswered</div>
    <span style="margin-left:auto;font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">
      <span>Click any cell to update</span>
      <span style="opacity:.4">·</span>
      <strong style="color:var(--gray-800)">${p.name}</strong>
      ${p.client ? `<span style="opacity:.4">·</span><span style="color:var(--gray-600);font-weight:500">${p.client}</span>` : ''}
      ${p.lp ? `<span style="opacity:.4">·</span><span style="color:var(--gray-400)">${p.lp}</span>` : ''}
    </span>
  </div>`

  // Build table
  let html = `<div class="grid-proj-pills">${pills}</div>${legend}<div class="grid-wrap"><table class="gtable">`

  // Header row
  html += '<thead><tr><th class="th-label"></th>'
  STAGES.forEach(st => {
    const isCur = st.id === p.stage
    html += `<th class="th-stage ${isCur?'cur':''}" style="border-bottom:2px solid ${isCur?st.color:'transparent'}">
      <div class="th-dot-g" style="background:${st.color}"></div>
      <div style="font-size:9px;font-weight:500;color:${isCur?st.color:'var(--gray-400)'}">${st.short}</div>
      ${isCur?`<div class="th-now-g" style="color:${st.color}">▶ now</div>`:'<div style="height:11px"></div>'}
    </th>`
  })
  html += '</tr></thead><tbody>'

  // Rows
  GRID_ROWS.forEach(grp => {
    // Group header row with counts
    html += '<tr class="g-group-row">'
    html += `<td class="g-grp-label">${grp.icon} ${grp.group}</td>`
    STAGES.forEach(st => {
      const rel = grp.items.filter(it => it.applicable.includes(st.id))
      if (!rel.length) { html += '<td></td>'; return }
      const done = rel.filter(it => {
        const ans = (p.answers||{})[it.id]
        return ans === 'yes'
      }).length
      const isCur = st.id === p.stage
      html += `<td style="${isCur?`color:${st.color};font-weight:600`:''}" class="g-count ${done>0?'has-done':''}">${done}/${rel.length}</td>`
    })
    html += '</tr>'

    // Item rows
    grp.items.forEach(item => {
      html += '<tr class="g-action-row">'
      const isCondLabel = item.conditional
      html += `<td class="g-row-label ${isCondLabel?'cond-lbl':''}">${item.label}${item.conditional?' <span style="font-size:9px;color:var(--amber)">if needed</span>':''}</td>`

      STAGES.forEach(st => {
        if (!item.applicable.includes(st.id)) {
          html += `<td style="text-align:center;color:var(--gray-200);font-size:11px">—</td>`
          return
        }

        const isCur = st.id === p.stage
        const ans = (p.answers||{})[item.id]
        const condKey = `${p.stage}_${item.id}_req`
        const condAns = (p.condAnswers||{})[condKey]
        const isOpen = gridOpenCell && gridOpenCell.itemId === item.id && gridOpenCell.stageId === st.id && gridOpenCell.projId === p.id

        // Get tick state for this specific stage
        const stageAns = getStageAnswer(p, item.id, st.id)
        const stageCond = getStageCondAns(p, item.id, st.id)

        // Auto-yes: green tick unless this stage is in autoYesExcept
        const isAutoYes = item.autoYes && !(item.autoYesExcept && item.autoYesExcept.includes(st.id))

        // Determine tick state
        let tickCls, tickIcon
        if (isAutoYes && !isCur) {
          tickCls = 'done'; tickIcon = '✓'
        } else if (isAutoYes && isCur) {
          // For contracting/executing crm1 — show auto if not in except list
          tickCls = 'done'; tickIcon = '✓'
        } else if (item.conditional) {
          if (stageCond === 'na') { tickCls='na'; tickIcon='—' }
          else if (stageCond === 'yes') {
            if (stageAns==='yes') { tickCls='done'; tickIcon='✓' }
            else if (stageAns==='no') { tickCls='nope'; tickIcon='✗' }
            else { tickCls='unanswered'; tickIcon='?' }
          } else { tickCls='cond'; tickIcon='◎' }
        } else {
          if (stageAns==='yes')     { tickCls='done'; tickIcon='✓' }
          else if (stageAns==='no') { tickCls='nope'; tickIcon='✗' }
          else if (stageAns==='na') { tickCls='na'; tickIcon='—' }
          else                      { tickCls='unanswered'; tickIcon='' }
        }

        const isBlocker = item.blocker && isCur && tickCls!=='done' && tickCls!=='na'
        const popupHtml = isOpen ? buildCellPopup(item, st, p, stageAns, stageCond, condKey) : ''

        const stageIds = STAGES.map(s => s.id)
        const curIdx  = stageIds.indexOf(p.stage)
        const thisIdx = stageIds.indexOf(st.id)
        const isPast  = thisIdx < curIdx
        const isFuture = thisIdx > curIdx

        if (isCur) {
          // Only current stage is clickable
          html += `<td class="gcell cur-stage" onclick="toggleCellPopup('${item.id}','${st.id}','${p.id}',event)" style="position:relative">
            <div class="tick ${tickCls} ${isBlocker?'blocker':''}">${tickIcon}</div>
            ${popupHtml}
          </td>`
        } else {
          // All other stages — read only
          const opacity = isPast ? '0.5' : '0.3'
          const title   = isPast ? 'Completed stage — read only' : 'Future stage — not yet reached'
          html += `<td class="gcell-readonly" style="text-align:center;vertical-align:middle;padding:3px 2px;cursor:default" title="${title}">
            <div class="tick ${tickCls}" style="opacity:${opacity}">${tickIcon}</div>
          </td>`
        }
      })
      html += '</tr>'
    })
  })

  html += '</tbody></table></div>'
  el.innerHTML = html
  _gridCache = {pid: p.id}
}

function buildCellPopup(item, st, p, ans, condAns, condKey) {
  let inner = `<div class="cell-popup-title">${item.label}</div>
    <div class="cell-popup-stage" style="color:${st.color}">${st.short}${st.id===p.stage?' · current stage':''}</div>`

  const al = ACTION_LINKS[item.id]
  const spBtn = al
    ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-100)">
        <button onclick="event.stopPropagation();window.open('${al.url}','_blank')"
          style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
                 font-size:11px;padding:6px 12px;border-radius:6px;
                 border:1px solid #B5D4F4;background:#E6F1FB;color:#0C447C;
                 cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500">
          ${al.icon} Open ${al.label} in SharePoint →
        </button>
       </div>`
    : ''

  if (item.conditional && st.id === p.stage) {
    if (!condAns || condAns === undefined) {
      inner += `<div class="cond-confirm">
        <div class="cond-q">Is this required for ${p.name}?</div>
        <div class="cond-btns">
          <button class="cdb req" onclick="gridSetCond('${condKey}','yes',event)">✓ Yes — required${item.blocker?' (Critical)':''}</button>
          <button class="cdb skip" onclick="gridSetCond('${condKey}','na',event)">— Not needed</button>
        </div>
      </div>`
    } else if (condAns === 'yes') {
      // KYC link after Yes
      const kycLink = (item.id === 'cl2' && ans === 'yes')
        ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-100)">
            <button onclick="event.stopPropagation();window.open('${KYC_LINK.url}','_blank')"
              style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
                     font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid #B5D4F4;
                     background:#E6F1FB;color:#0C447C;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500">
              ${KYC_LINK.icon} Open ${KYC_LINK.label} in SharePoint →
            </button></div>`
        : ''
      inner += `<div class="cell-popup-btns">
        <button class="cpb y" onclick="gridSetAnswer('${item.id}','yes',event)">✓ Yes — done</button>
        <button class="cpb n" onclick="gridSetAnswer('${item.id}','no',event)">✗ Not yet</button>
        <button class="cpb na" onclick="gridSetCond('${condKey}','na',event)" style="font-size:10px;padding:4px 8px">undo</button>
      </div>
      ${ans === 'yes' ? (spBtn || kycLink) : ''}`
    } else {
      inner += `<div style="font-size:11px;color:var(--gray-400);margin-bottom:8px">Marked as not required.</div>
        <button class="cpb na" onclick="gridSetCond('${condKey}',undefined,event)">Change</button>`
    }
  } else {
    // Only show N/A for optional (non-blocker) items
    const naBtn = !item.blocker
      ? `<button class="cpb na" onclick="gridSetAnswer('${item.id}','na',event)">— N/A</button>`
      : ''
    inner += `<div class="cell-popup-btns">
      <button class="cpb y" onclick="gridSetAnswer('${item.id}','yes',event)">✓ Yes — done</button>
      <button class="cpb n" onclick="gridSetAnswer('${item.id}','no',event)">✗ Not yet</button>
      ${naBtn}
    </div>
    ${ans === 'yes' ? spBtn : ''}`
  }

  // Zoho CRM link — only for CRM group items
  const isCrmItem = item.id.startsWith('crm')
  if (isCrmItem) {
    const zohoUrl = 'https://crm.zoho.eu/crm/org20109486492/tab/Potentials/' + p.id.replace('zcrm_', '')
    inner += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-100)">
      <button onclick="event.stopPropagation();window.open('${zohoUrl}','_blank')"
        style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
               font-size:11px;padding:5px 12px;border-radius:6px;
               border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-600);
               cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500">
        🔗 Open deal in Zoho CRM →
      </button>
    </div>`
  }

  return `<div class="cell-popup" onclick="event.stopPropagation()">${inner}</div>`
}

function toggleCellPopup(itemId, stageId, projId, event) {
  event.stopPropagation()
  if (gridOpenCell && gridOpenCell.itemId===itemId && gridOpenCell.stageId===stageId && gridOpenCell.projId===projId) {
    gridOpenCell = null
  } else {
    gridOpenCell = {itemId, stageId, projId}
  }
  renderGrid()
}

// Close popup on outside click
document.addEventListener('click', () => { if(gridOpenCell){gridOpenCell=null;renderGrid()} })

// Per-stage answer helpers — answers are keyed by stageKey__actionId in full data
// For the current stage they're in p.answers; for other stages we need the raw tick data
function getStageAnswer(p, actionId, stageId) {
  // Check auto-tick rules first — if all underlying actions are done, grid cell = yes
  const rules = GRID_AUTO_RULES[actionId]
  if (rules && rules[stageId]) {
    const requiredIds = rules[stageId]
    const answers = stageId === p.stage
      ? (p.answers || {})
      : Object.fromEntries(requiredIds.map(id => {
          const key = p.id + '__' + stageId + '__' + id
          const t = allTicksCache[key]
          return [id, t ? (t.na ? 'na' : t.done ? 'yes' : 'no') : undefined]
        }))
    const allDone = requiredIds.every(id => answers[id] === 'yes')
    const anyNo   = requiredIds.some(id => answers[id] === 'no')
    if (allDone) return 'yes'
    if (anyNo)   return 'no'
    // Some answered, some not — show partial (unanswered)
    return undefined
  }

  // Default: direct lookup
  if (stageId === p.stage) return (p.answers||{})[actionId]
  const key = p.id + '__' + stageId + '__' + actionId
  const t = allTicksCache[key]
  if (!t) return undefined
  return t.na ? 'na' : t.done ? 'yes' : 'no'
}
function getStageCondAns(p, actionId, stageId) {
  if (stageId === p.stage) {
    const key = stageId + '_' + actionId + '_req'
    return (p.condAnswers||{})[key]
  }
  return undefined // for other stages, treat as not confirmed
}

function gridSelProject(id) { gridSelProj=id; gridOpenCell=null; renderGrid() }

async function gridSetAnswer(qid, val, event) {
  event.stopPropagation()
  const p = projects.find(x => x.id === gridSelProj)
  if (!p) return
  const stageId = gridOpenCell ? gridOpenCell.stageId : p.stage
  // Update local state
  if (stageId === p.stage) {
    p.answers[qid] = val
    p.status = recalcStatus(p)
  }
  // Update cache
  const cacheKey = p.id + '__' + stageId + '__' + qid
  allTicksCache[cacheKey] = { done: val==='yes', na: val==='na' }
  // Keep popup open if Yes was clicked and there's a SharePoint link — so link shows immediately
  const shouldKeepOpen = val === 'yes' && (ACTION_LINKS[qid] || (qid === 'cl2' && stageId === 'contracting'))
  if (!shouldKeepOpen) {
    gridOpenCell = null
  }
  renderGrid()
  // Write to Supabase with correct stage
  const isDone = val === 'yes'
  const isNa   = val === 'na'
  await sbUpsert('ticks', {
    project_id: p.id, stage_key: stageId, action_id: qid,
    is_done: isDone, is_na: isNa,
    last_toggled_by: currentUser, last_toggled_role: currentRole,
    last_toggled_at: new Date().toISOString(),
  }, 'project_id,stage_key,action_id')
  showSaving(); hideSaving(true)
}

function gridSetCond(key, val, event) {
  event.stopPropagation()
  const p = projects.find(x => x.id === gridSelProj)
  if (!p) return
  if (!p.condAnswers) p.condAnswers = {}
  if (val === undefined) delete p.condAnswers[key]
  else p.condAnswers[key] = val
  // Keep popup open when marking as required (val='yes') so user can then tick Yes/No
  if (val !== 'yes') gridOpenCell = null
  renderGrid()
}

// ══════════════════════════════════════════════
// INIT

loadDashboard()
